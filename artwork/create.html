<main class="account-page">
 <section class="hero">
    <div class="hero-content">
        <h1>CREATE ARTWORK</h1>

        <nav class="breadcrumb" aria-label="Breadcrumb">
            <a href="../index.html">Home</a>
            <span>/</span>
            <span>Create Artwork</span>
        </nav>
    </div>
 </section>

 <section class="account-section">
    <div class="account-card">
        <form id="create-artwork-form" class="account-form">
            <div class="form-group">
                <label for="create-title">Artwork Title</label>
                <input
                    type="text"
                    id="create-artist"
                    name="artist"
                    required
                >
            </div>

            <div class="form-group">
                <label for="create-year">year</label>
                <input
                    type="number"
                    id="create-year"
                    name="year"
                    min="1"
                    required
                >
                    <p class="form-message">Please enter a valid year</p>
            </div>

            <div class="form-group">
                <label for="create-medium">Medium</label>
                <input  
                    type="text"
                    id="create-medium"
                    name="medium"
                    required
                >
            </div>

            <div class="form-group">
                <label for="create-image">Image URL</label>
                <input
                    type="url"
                    id="create-image"
                    name="image"
                    required
                >
                    <p class="form-message">
                        Please enter a public image URL
                    </p>
            </div>

            <div class="form-group">
                <label for="create-description">Description</label>
                <textarea
                    id="create-description"
                    name="description"
                    rows="6"
                    required
                ></textarea>
                <p class="form-message"> 
                    Description must be filled in
                </p>
            </div>

            <button type="submit" class="primary-button">
                SAVE
            </button>

            <p
                id="create-status"
                class="form-status"
                role="status"
                aria-live="polite"
            ></p>
        </form>
    </div>
 </section>

</main>
