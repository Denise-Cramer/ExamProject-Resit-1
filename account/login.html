<html lang="en">

        <meta charset="UTF-8">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"    
    />
        <link rel="stylesheet" href="../css/variables.css">
        <link rel="stylesheet" href="../css/style.css">
        <link rel="stylesheet" href="../css/header.css">
        <link rel="stylesheet" href="../css/footer.css">
        <link rel="stylesheet" href="../css/cards.css">
        <link rel="stylesheet" href="../css/forms.css">
        <link rel="stylesheet" href="../css/responsive.css">
    </head>

    <body>
        <header class="site-header">
    <div class="container header-container">

<div class="header-left">

            <a href="../index.html" class="logo">
            <span>NORDIC</span>
            <span>ART</span>
            <span>ARCHIVE</span>
        </a>

        <button class="menu-button" type="button" aria-label="open navigation menu">
            <i class="fa-solid fa-bars" aria-hidden="true"></i>
        </button>
</div>

        <nav class="header-icons">

            <a href="../artwork/index.html" aria-label="Gallery">
                <i class="fa-solid fa-image"></i>
            </a>

            <a href="./login.html" aria-label="User">
                <i class="fa-solid fa-user"></i>
            </a>
            
            <a href="../index.html" aria-label="Home">
                <i class="fa-solid fa-home"></i>
            </a>

        </nav>

    </div>
</header>

<main class="account-page">
    <section class="hero">
        <div class="hero-content">
            <h1> LOGIN</h1>
            <nav class="breadcrumb" aria-label="Breadcrumb">
                <a href="../index.html">Home</a>
                <span aria-hidden="true">/</span>
                <span>Login</span>
            </nav>
        </div>
    </section>

    <section class="account-section">
        <div class="account-card">
            <form id="login-form" class="account-form">
                <div class="form-group">
                    <label for="login-email">E-mail</label>
                    
                    <input
                        type="email"
                        id="login-email"
                        name="email"
                        autocomplete="email"
                        aria-describedby="login-email-message"
                        required
                    >

                    <p 
                        id="login-email-message"
                        class="form-message">
                        Please enter a valid email address
                    </p>
                </div>

                <div class="form-group">
                    <label for="login-password">Password</label>

                    <input
                        type="password"
                        id="login-password"
                        name="password"
                        minlength="8"
                        autocomplete="current-password"
                        aria-describedby="login-password-message"
                        required
                    >

                    <p 
                        id="login-password-message"
                        class="form-message">
                        Password must contain at least 8 characters
                    </p>
                </div>

                <button type="submit" class="primary-button">
                    LOGIN
                </button>

                <p 
                    id="login-status"
                    class="form-status"
                    role="status"
                    aria-live="polite"
                    ></p>
            </form>

            <div class="account-switch">
                <p>Not registrered yet?</p>

                <a 
                    href="./register.html"
                    class="secondary-button"
                    >
                    REGISTER
                </a>
            </div>

        </div>
    </section>

</main>
    <footer class="site-footer">
    <div class="footer-container">

        <a href="../index.html" class="footer-logo">
            <span>NORDIC</span>

            <span>ARCHIVE</span>
        </a>

        <p class="footer-tagline">
            Discover contemporary Nordic Art
        </p>

        <nav class="footer-nav" aria-label="Footer Navigation">
            <a href="../index.html" class="footer-link">Home</a>
            <a href="../account/register.html" class="footer-link">Register</a>
            <a href="../account/login.html" class="footer-link">Login</a>
        </nav>

        <p class="footer-copyright">
            &copy; 2026 Nordic Art Archive. All rights reserved.
        </p>
    </div>
   
</footer>

    <script src="../js/app.js"></script>
    </body>
</html>
